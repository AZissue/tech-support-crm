<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技术支持工单与客户管理系统</title>
<style>
/* ===== CSS Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; line-height: 1.6; min-height: 100vh; }
a { text-decoration: none; color: inherit; }
ul, ol { list-style: none; }
img { max-width: 100%; display: block; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea, select { font-family: inherit; font-size: 1rem; }

/* ===== CSS Variables ===== */
:root {
  --primary: #1890ff; --primary-dark: #096dd9; --primary-light: #e6f7ff;
  --success: #52c41a; --success-light: #f6ffed;
  --warning: #faad14; --warning-light: #fffbe6;
  --danger: #ff4d4f; --danger-light: #fff1f0;
  --info: #13c2c2; --info-light: #e6fffb;
  --text: #262626; --text-secondary: #595959; --text-muted: #8c8c8c;
  --border: #d9d9d9; --border-light: #f0f0f0;
  --bg: #f0f2f5; --bg-white: #fff; --bg-sidebar: #001529;
  --shadow: 0 2px 8px rgba(0,0,0,0.08); --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
  --radius: 6px; --radius-lg: 8px;
  --sidebar-width: 220px; --header-height: 64px;
}

/* ===== Layout ===== */
.app-layout { display: flex; min-height: 100vh; }
.sidebar {
  width: var(--sidebar-width); background: var(--bg-sidebar); color: #fff;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
  transition: transform .3s; overflow-y: auto;
}
.sidebar-brand { padding: 16px; font-size: 1.1rem; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 8px; }
.sidebar-brand .icon { font-size: 1.4rem; }
.sidebar-nav { padding: 8px 0; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 20px; color: rgba(255,255,255,0.7); transition: all .2s; cursor: pointer; }
.nav-item:hover, .nav-item.active { background: #1890ff; color: #fff; }
.nav-item .icon { font-size: 1.1rem; width: 20px; text-align: center; }
.nav-group-title { padding: 12px 20px 4px; font-size: .75rem; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: .5px; }
.main { flex: 1; margin-left: var(--sidebar-width); min-height: 100vh; display: flex; flex-direction: column; }
.header {
  height: var(--header-height); background: #fff; border-bottom: 1px solid var(--border-light);
  display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
  position: sticky; top: 0; z-index: 50;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.menu-toggle { display: none; font-size: 1.3rem; color: var(--text-secondary); }
.header-right { display: flex; align-items: center; gap: 16px; }
.badge-btn { position: relative; padding: 8px; color: var(--text-secondary); font-size: 1.1rem; }
.badge-btn .badge {
  position: absolute; top: 4px; right: 4px; min-width: 16px; height: 16px; padding: 0 4px;
  background: var(--danger); color: #fff; font-size: .65rem; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.user-info { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 8px; border-radius: var(--radius); }
.user-info:hover { background: var(--bg); }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: .85rem; font-weight: 600; }
.content { flex: 1; padding: 24px; overflow-y: auto; }
.page-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 20px; color: var(--text); }

/* ===== Mobile Sidebar Overlay ===== */
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }

/* ===== Cards ===== */
.card { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow); margin-bottom: 20px; }
.card-header { padding: 16px 20px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-weight: 600; font-size: 1.05rem; }
.card-body { padding: 20px; }

/* ===== Stats Row ===== */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
.stat-card { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 20px; display: flex; align-items: center; gap: 16px; }
.stat-icon { width: 48px; height: 48px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
.stat-icon.blue { background: var(--primary-light); color: var(--primary); }
.stat-icon.green { background: var(--success-light); color: var(--success); }
.stat-icon.orange { background: var(--warning-light); color: var(--warning); }
.stat-icon.red { background: var(--danger-light); color: var(--danger); }
.stat-icon.cyan { background: var(--info-light); color: var(--info); }
.stat-value { font-size: 1.6rem; font-weight: 700; color: var(--text); }
.stat-label { font-size: .85rem; color: var(--text-muted); }

/* ===== Buttons ===== */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); font-size: .9rem; transition: all .2s; border: 1px solid transparent; cursor: pointer; }
.btn:disabled { opacity: .6; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--primary-dark); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover:not(:disabled) { background: #389e0d; }
.btn-warning { background: var(--warning); color: #fff; }
.btn-warning:hover:not(:disabled) { background: #d48806; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover:not(:disabled) { background: #cf1322; }
.btn-default { background: #fff; border-color: var(--border); color: var(--text); }
.btn-default:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
.btn-sm { padding: 4px 12px; font-size: .85rem; }
.btn-lg { padding: 10px 24px; font-size: 1rem; }
.btn-group { display: flex; gap: 8px; }

/* ===== Forms ===== */
.form-group { margin-bottom: 16px; }
.form-label { display: block; margin-bottom: 6px; font-size: .9rem; color: var(--text-secondary); font-weight: 500; }
.form-label .required { color: var(--danger); margin-left: 2px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius);
  background: #fff; color: var(--text); transition: border-color .2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(24,144,255,0.1); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-hint { font-size: .8rem; color: var(--text-muted); margin-top: 4px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ===== Tables ===== */
.table-wrap { overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th, .data-table td { padding: 12px 16px; text-align: left; font-size: .9rem; }
.data-table thead th { background: #fafafa; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border-light); white-space: nowrap; }
.data-table tbody tr { border-bottom: 1px solid var(--border-light); transition: background .2s; }
.data-table tbody tr:hover { background: #fafafa; }
.data-table td { color: var(--text); }

/* ===== Tags ===== */
.tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: .8rem; font-weight: 500; }
.tag-blue { background: var(--primary-light); color: var(--primary); }
.tag-green { background: var(--success-light); color: var(--success); }
.tag-orange { background: var(--warning-light); color: var(--warning); }
.tag-red { background: var(--danger-light); color: var(--danger); }
.tag-gray { background: #f5f5f5; color: var(--text-muted); }
.tag-purple { background: #f3e8ff; color: #7c3aed; }

/* ===== Status ===== */
.status { display: inline-flex; align-items: center; gap: 4px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; }
.status-dot.blue { background: var(--primary); }
.status-dot.green { background: var(--success); }
.status-dot.orange { background: var(--warning); }
.status-dot.red { background: var(--danger); }
.status-dot.gray { background: #bfbfbf; }

/* ===== Search & Filters ===== */
.search-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.search-input { flex: 1; min-width: 200px; position: relative; }
.search-input input { width: 100%; padding: 8px 12px 8px 36px; border: 1px solid var(--border); border-radius: var(--radius); }
.search-input::before { content: "🔍"; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: .5; font-size: .9rem; }
.filter-group { display: flex; gap: 8px; flex-wrap: wrap; }

/* ===== Empty State ===== */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; opacity: .5; }
.empty-state .title { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 8px; }

/* ===== Modal ===== */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; animation: modalIn .2s ease; }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-weight: 600; font-size: 1.05rem; }
.modal-close { font-size: 1.3rem; color: var(--text-muted); cursor: pointer; padding: 4px; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px; }
.modal-footer { padding: 12px 20px; border-top: 1px solid var(--border-light); display: flex; justify-content: flex-end; gap: 8px; }
@keyframes modalIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Dropdown ===== */
.dropdown { position: relative; }
.dropdown-menu { position: absolute; right: 0; top: 100%; margin-top: 4px; background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-lg); border: 1px solid var(--border-light); min-width: 160px; z-index: 150; display: none; }
.dropdown.open .dropdown-menu { display: block; }
.dropdown-item { padding: 10px 16px; cursor: pointer; font-size: .9rem; color: var(--text); display: flex; align-items: center; gap: 8px; }
.dropdown-item:hover { background: #f5f5f5; }

/* ===== Login Page - Professional Split Layout ===== */
.login-page {
  min-height: 100vh;
  display: flex;
  background: var(--bg-white);
}

/* 左侧品牌区 */
.login-left {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 48px;
  background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 50%, #4f46e5 100%);
  color: white;
  position: relative;
  overflow: hidden;
}
.login-left::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  opacity: 0.5;
}
.login-left-content {
  position: relative;
  max-width: 420px;
}
.login-brand-logo {
  font-size: 2rem;
  font-weight: 800;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.login-brand-tagline {
  font-size: 1.25rem;
  font-weight: 600;
  margin-bottom: 16px;
  opacity: 0.95;
}
.login-brand-desc {
  font-size: 1rem;
  line-height: 1.7;
  opacity: 0.8;
  margin-bottom: 32px;
}
.login-brand-features {
  list-style: none;
}
.login-brand-features li {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  font-size: 0.9rem;
  opacity: 0.85;
}
.login-brand-features li::before {
  content: '✓';
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
}

/* 右侧登录区 */
.login-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 48px;
}
.login-card {
  width: 100%;
  max-width: 420px;
  background: var(--bg-white);
  border-radius: 16px;
  box-shadow: var(--shadow-lg);
  padding: 48px;
  animation: cardSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes cardSlideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.login-card-header {
  text-align: center;
  margin-bottom: 32px;
}
.login-card-title {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}
.login-card-subtitle {
  font-size: 0.9rem;
  color: var(--text-muted);
}

/* 登录表单 */
.login-form .form-group {
  margin-bottom: 20px;
}
.login-form .form-label {
  display: block;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.login-form .form-input {
  width: 100%;
  height: 48px;
  padding: 0 16px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 1rem;
  color: var(--text);
  background: var(--bg-white);
  transition: all 0.2s;
}
.login-form .form-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
  outline: none;
}
.login-form .form-input::placeholder {
  color: var(--text-muted);
}
.login-form .input-wrap {
  position: relative;
}
.login-form .input-wrap .toggle-pass {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: var(--text-muted);
  font-size: 1rem;
  user-select: none;
}
.login-form .input-wrap .toggle-pass:hover {
  color: var(--primary);
}
.login-remember {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.login-remember-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.9rem;
  color: var(--text-secondary);
  cursor: pointer;
}
.login-remember-label input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--primary);
}
.login-btn {
  width: 100%;
  height: 48px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.login-btn:hover:not(:disabled) {
  background: var(--primary-dark);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(24,144,255,0.3);
}
.login-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}
.login-btn .spinner {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.login-hint {
  text-align: center;
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--border-light);
  font-size: 0.8rem;
  color: var(--text-muted);
  line-height: 1.8;
}
.login-hint code {
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 4px;
  font-family: monospace;
  color: var(--primary);
  font-size: 0.85rem;
}

/* 响应式 */
@media (max-width: 768px) {
  .login-page { flex-direction: column; }
  .login-left {
    flex: none;
    padding: 32px 24px;
    min-height: 200px;
    text-align: center;
  }
  .login-brand-features { display: none; }
  .login-right { flex: 1; padding: 24px; }
  .login-card { box-shadow: none; padding: 24px 0; border-radius: 0; }
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ===== Tabs ===== */
.tabs { display: flex; border-bottom: 1px solid var(--border-light); margin-bottom: 20px; gap: 4px; }
.tab { padding: 10px 16px; cursor: pointer; color: var(--text-secondary); font-size: .9rem; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .2s; }
.tab:hover { color: var(--primary); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 500; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ===== Timeline ===== */
.timeline { position: relative; padding-left: 24px; }
.timeline::before { content: ""; position: absolute; left: 7px; top: 4px; bottom: 4px; width: 2px; background: var(--border-light); }
.timeline-item { position: relative; padding-bottom: 20px; }
.timeline-dot { position: absolute; left: -20px; top: 4px; width: 14px; height: 14px; border-radius: 50%; background: var(--primary); border: 2px solid #fff; box-shadow: 0 0 0 2px var(--primary-light); }
.timeline-dot.green { background: var(--success); box-shadow: 0 0 0 2px var(--success-light); }
.timeline-dot.orange { background: var(--warning); box-shadow: 0 0 0 2px var(--warning-light); }
.timeline-dot.red { background: var(--danger); box-shadow: 0 0 0 2px var(--danger-light); }
.timeline-time { font-size: .8rem; color: var(--text-muted); margin-bottom: 4px; }
.timeline-content { background: #f5f5f5; padding: 10px 14px; border-radius: var(--radius); font-size: .9rem; }

/* ===== Notifications ===== */
.notify-container { position: fixed; top: 20px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 10px; }
.notify-item {
  background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-lg);
  padding: 14px 18px; min-width: 280px; max-width: 360px;
  display: flex; align-items: flex-start; gap: 10px; animation: notifyIn .3s ease;
  border-left: 4px solid var(--primary);
}
.notify-item.success { border-left-color: var(--success); }
.notify-item.warning { border-left-color: var(--warning); }
.notify-item.error { border-left-color: var(--danger); }
.notify-item .icon { font-size: 1.2rem; flex-shrink: 0; }
.notify-item .content { flex: 1; }
.notify-item .title { font-weight: 600; font-size: .95rem; margin-bottom: 2px; }
.notify-item .message { font-size: .85rem; color: var(--text-secondary); }
.notify-close { color: var(--text-muted); cursor: pointer; font-size: 1.1rem; }
@keyframes notifyIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
@keyframes notifyOut { to { opacity: 0; transform: translateX(100%); } }

/* ===== Smart Input ===== */
.smart-input-wrap { position: relative; }
.smart-input { width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: var(--radius-lg); font-size: 1rem; transition: all .2s; resize: vertical; min-height: 60px; }
.smart-input:focus { outline: none; border-color: var(--primary); }
.smart-hint { margin-top: 8px; padding: 10px 14px; background: var(--primary-light); border-radius: var(--radius); font-size: .85rem; color: var(--text-secondary); }
.smart-hint strong { color: var(--primary); }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .menu-toggle { display: block; }
  .sidebar-overlay.show { display: block; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .form-row { grid-template-columns: 1fr; }
  .search-bar { flex-direction: column; }
  .header { padding: 0 16px; }
  .content { padding: 16px; }
  .data-table th, .data-table td { padding: 10px 12px; white-space: nowrap; }
  .modal { margin: 10px; }
}
@media (max-width: 480px) {
  .stats-row { grid-template-columns: 1fr; }
}

/* ===== Utility ===== */
.text-right { text-align: right; }
.text-center { text-align: center; }
.text-muted { color: var(--text-muted); }
.text-primary { color: var(--primary); }
.text-success { color: var(--success); }
.text-danger { color: var(--danger); }
.text-warning { color: var(--warning); }
.font-bold { font-weight: 600; }
.font-sm { font-size: .85rem; }
.mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; }

<div id="app"></div>

<script>
// ===================== 工具函数 =====================
const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 6);

const debounce = (fn, delay) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), delay); }; };

window.doSmartParse = () => {
  const smartInput = document.getElementById('smart-input');
  if (!smartInput) return;
  const text = smartInput.value.trim();
  if (!text) { notify('请先输入问题描述', '', 'warning'); return; }
  const parsed = parseTicketInput(text);
  if (parsed.title) document.getElementById('new-title').value = parsed.title;
  if (parsed.customerId) {
    const c = getCustomers().find(x => x.id === parsed.customerId);
    if (c) {
      document.getElementById('new-customer-id').value = c.id;
      document.getElementById('new-customer-search').value = c.name;
    }
  }
  if (parsed.priority) document.getElementById('new-priority').value = parsed.priority;
  if (parsed.category) document.getElementById('new-category').value = parsed.category;
  if (parsed.description) document.getElementById('new-desc').value = parsed.description;
  if (parsed.engineerId && document.getElementById('new-engineer')) {
    document.getElementById('new-engineer').value = parsed.engineerId;
  }
  if (parsed.status && document.getElementById('new-status')) {
    document.getElementById('new-status').value = parsed.status;
  }
  notify('解析完成', '已自动填充识别到的字段', 'success');
};
const formatDate = (d, fmt = 'yyyy-MM-dd HH:mm') => {
  if (!d) return '-';
  const date = typeof d === 'string' ? new Date(d) : d;
  if (isNaN(date)) return '-';
  const pad = n => String(n).padStart(2, '0');
  const map = { yyyy: date.getFullYear(), MM: pad(date.getMonth()+1), dd: pad(date.getDate()), HH: pad(date.getHours()), mm: pad(date.getMinutes()), ss: pad(date.getSeconds()) };
  return fmt.replace(/yyyy|MM|dd|HH|mm|ss/g, m => map[m]);
};
const escapeHtml = str => str == null ? '' : String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[m]));

window.copyToClipboard = async (text) => {
  try {
    await navigator.clipboard.writeText(text);
    notify('已复制', text, 'success');
  } catch (e) {
    // 降级方案
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    notify('已复制', text, 'success');
  }
};

window.closeModalWithCleanup = (btn) => {
  const modal = btn.closest('.modal-overlay');
  const container = document.getElementById('new-images');
  if (container && container._cleanupPaste) container._cleanupPaste();
  __pendingImages = [];
  modal.remove();
};

function openImageLightbox(src) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.style.cssText = 'display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);z-index:2000;';
  overlay.innerHTML = `<img src="${src}" style="max-width:90vw;max-height:90vh;object-fit:contain;cursor:zoom-out;box-shadow:0 20px 60px rgba(0,0,0,0.5);border-radius:4px;" onclick="this.closest('.modal-overlay').remove()">`;
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  document.addEventListener('keydown', function esc(e) { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', esc); } });
  document.body.appendChild(overlay);
}

// ===================== 图片压缩工具 =====================
function compressImage(file, maxWidth = 1200, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

let __pendingImages = []; // 当前弹窗待上传的图片

function initImageUpload(containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = `
    <div class="image-upload-area" id="${containerId}-drop" style="border:2px dashed var(--border);border-radius:var(--radius);padding:12px;text-align:center;color:var(--text-muted);cursor:pointer;transition:all .2s;" onclick="document.getElementById('${containerId}-file').click()">
      <div style="font-size:1.5rem;margin-bottom:4px;">📎</div>
      <div style="font-size:.85rem;">点击上传或粘贴图片 (Ctrl+V)</div>
      <div style="font-size:.75rem;margin-top:2px;">支持 JPG/PNG，自动压缩</div>
    </div>
    <input type="file" id="${containerId}-file" accept="image/*" multiple style="display:none">
    <div id="${containerId}-preview" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;"></div>
  `;
  const drop = document.getElementById(`${containerId}-drop`);
  const fileInput = document.getElementById(`${containerId}-file`);
  const preview = document.getElementById(`${containerId}-preview`);

  // 点击上传
  fileInput.addEventListener('change', async (e) => {
    for (const file of e.target.files) await addImage(file, preview);
  });

  // 拖拽
  drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.style.borderColor = 'var(--primary)'; drop.style.background = 'var(--primary-light)'; });
  drop.addEventListener('dragleave', () => { drop.style.borderColor = 'var(--border)'; drop.style.background = ''; });
  drop.addEventListener('drop', async (e) => {
    e.preventDefault();
    drop.style.borderColor = 'var(--border)'; drop.style.background = '';
    for (const file of e.dataTransfer.files) if (file.type.startsWith('image/')) await addImage(file, preview);
  });

  // 粘贴
  const pasteHandler = async (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    let hasImage = false;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        hasImage = true;
        e.preventDefault();
        await addImage(item.getAsFile(), preview);
      }
    }
  };
  document.addEventListener('paste', pasteHandler);
  // 清理函数挂在容器上
  container._cleanupPaste = () => document.removeEventListener('paste', pasteHandler);
}

async function addImage(file, previewEl) {
  try {
    const base64 = await compressImage(file);
    const id = generateId();
    __pendingImages.push({ id, base64, name: file.name });
    const div = document.createElement('div');
    div.style.cssText = 'position:relative;width:80px;height:80px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);';
    div.innerHTML = `<img src="${base64}" style="width:100%;height:100%;object-fit:cover;"><button onclick="removeImage('${id}',this)" style="position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.5);color:#fff;border:none;font-size:12px;cursor:pointer;">×</button>`;
    previewEl.appendChild(div);
  } catch (e) { console.warn('图片压缩失败', e); }
}

window.removeImage = (id, btn) => {
  __pendingImages = __pendingImages.filter(x => x.id !== id);
  btn.closest('div').remove();
};


// ===================== API Client =====================
const API_BASE = '/api';
let __token = localStorage.getItem('crm_token') || '';
let __users = [];
let __tickets = [];
let __customers = [];

async function apiFetch(path, opts = {}) {
  const url = `${API_BASE}${path}`;
  const res = await fetch(url, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      ...( __token ? { 'Authorization': `Bearer ${__token}` } : {} ),
      ...(opts.headers || {})
    }
  });
  if (res.status === 401) { logout(); throw new Error('未登录'); }
  if (res.status === 403) throw new Error('权限不足');
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json().catch(() => ({}));
}

async function loadAllData() {
  try {
    const [users, tickets, customers] = await Promise.all([
      apiFetch('/users'),
      apiFetch('/tickets'),
      apiFetch('/customers')
    ]);
    __users = users || [];
    __tickets = tickets || [];
    __customers = customers || [];
    return true;
  } catch (e) {
    console.error('[API] 加载数据失败:', e);
    return false;
  }
}

// 自动刷新
let __refreshTimer = null;
let __lastRefresh = 0;

async function doRefresh() {
  const btn = document.getElementById('btn-refresh');
  if (btn) { btn.style.animation = 'spin 1s linear infinite'; }
  const ok = await loadAllData();
  if (ok) {
    __lastRefresh = Date.now();
    notify('数据已刷新', '', 'success', 1500);
    // 直接重渲染当前页面
    if (currentRoute === 'dashboard' || currentRoute === 'tickets' || currentRoute === 'customers' || currentRoute.startsWith('ticket/') || currentRoute.startsWith('customer/')) {
      renderRoute();
    }
  } else {
    notify('刷新失败', '请检查后端服务是否启动', 'error', 3000);
  }
  if (btn) { btn.style.animation = ''; }
}

function startAutoRefresh() {
  stopAutoRefresh();
  // 自动刷新已禁用：避免刷新时清除用户正在输入的内容
  // __refreshTimer = setInterval(...)
}
function stopAutoRefresh() { if (__refreshTimer) { clearInterval(__refreshTimer); __refreshTimer = null; } }

window.addEventListener('beforeunload', stopAutoRefresh);

const getUsers = () => __users;
const getTickets = () => __tickets;
const getCustomers = () => __customers;

// ===================== Auth (API) =====================
async function loginAsync(username, password, remember) {
  const result = await apiFetch('/login', { method: 'POST', body: JSON.stringify({ username, password }) });
  if (!result.token) return null;
  __token = result.token;
  if (remember) localStorage.setItem('crm_token', __token);
  else sessionStorage.setItem('crm_token', __token);
  await loadAllData();
  startAutoRefresh();
  return result.user;
}

function logout() {
  stopAutoRefresh();
  __token = '';
  localStorage.removeItem('crm_token');
  sessionStorage.removeItem('crm_token');
  __users = []; __tickets = []; __customers = [];
  window.location.hash = '#login';
}

function getCurrentUser() {
  if (!__token) {
    const t = localStorage.getItem('crm_token') || sessionStorage.getItem('crm_token');
    if (t) __token = t;
    else return null;
  }
  try {
    const decoded = atob(__token);
    const [id, username, role] = decoded.split(':');
    const user = __users.find(u => u.id === id);
    if (user) return { ...user, userId: user.id };
    // Fallback: 数据未加载时返回基本信息，确保界面不崩溃
    return { id, username, role, userId: id, name: username || '用户', color: '#1890ff', email: '', phone: '' };
  } catch { return null; }
}

const isAdmin = () => { const s = getCurrentUser(); return s && s.role === 'admin'; };
const isEngineer = () => { const s = getCurrentUser(); return s && (s.role === 'engineer' || s.role === 'admin'); };

// ===================== 数据操作 (API + 本地缓存) =====================
async function saveTicketUpdate(id, fields) {
  await apiFetch(`/tickets/${id}`, { method: 'PUT', body: JSON.stringify(fields) });
  const idx = __tickets.findIndex(t => t.id === id);
  if (idx >= 0) Object.assign(__tickets[idx], fields);
}

async function createTicketAsync(ticket) {
  const newT = await apiFetch('/tickets', { method: 'POST', body: JSON.stringify(ticket) });
  __tickets.unshift(newT);
  return newT;
}

async function addTicketComment(id, comment) {
  await apiFetch(`/tickets/${id}/comments`, { method: 'POST', body: JSON.stringify(comment) });
  const t = __tickets.find(tk => tk.id === id);
  if (t) {
    t.comments = t.comments || [];
    t.comments.push({ ...comment, userId: (getCurrentUser() || {}).id, userName: (getCurrentUser() || {}).name, createdAt: new Date().toISOString() });
  }
}

async function createCustomerAsync(c) {
  const newC = await apiFetch('/customers', { method: 'POST', body: JSON.stringify(c) });
  __customers.push(newC);
  return newC;
}

async function updateCustomerAsync(id, fields) {
  await apiFetch(`/customers/${id}`, { method: 'PUT', body: JSON.stringify(fields) });
  const idx = __customers.findIndex(c => c.id === id);
  if (idx >= 0) Object.assign(__customers[idx], fields);
}

async function createUserAsync(u) {
  const newU = await apiFetch('/users', { method: 'POST', body: JSON.stringify(u) });
  __users.push(newU);
  return newU;
}

async function updateUserAsync(id, fields) {
  await apiFetch(`/users/${id}`, { method: 'PUT', body: JSON.stringify(fields) });
  const idx = __users.findIndex(u => u.id === id);
  if (idx >= 0) Object.assign(__users[idx], fields);
}

async function fetchStats() {
  return apiFetch('/stats');
}

// 初始化数据由后端 seed，前端不再 initData

// ===================== 自然语言解析模块 =====================
function parseTicketInput(text) {
  const result = { title: '', customerId: '', engineerId: '', priority: 'medium', category: '', description: text };
  const customers = getCustomers();
  const engineers = getUsers().filter(u => u.role === 'engineer');
  const t = text.trim();
  
  // === Levenshtein 距离（用于模糊匹配）===
  function levenshtein(a, b) {
    const m = [], n = a.length, p = b.length;
    if (!n) return p; if (!p) return n;
    for (let i = 0; i <= n; i++) m[i] = [i];
    for (let j = 0; j <= p; j++) m[0][j] = j;
    for (let i = 1; i <= n; i++) {
      for (let j = 1; j <= p; j++) {
        m[i][j] = a[i-1] === b[j-1] ? m[i-1][j-1] : Math.min(m[i-1][j-1]+1, m[i][j-1]+1, m[i-1][j]+1);
      }
    }
    return m[n][p];
  }

  // === 1. 客户识别（精确匹配 + 模糊匹配）===
  let bestMatch = null;
  let bestScore = 0;
  // 1a. 精确匹配
  for (const c of customers) {
    let score = 0;
    if (t.includes(c.name)) score += 100;
    if (c.contact && t.includes(c.contact)) score += 80;
    if (c.name.length > 4) {
      const short = c.name.substring(0, 4);
      if (t.includes(short)) score += 60;
    }
    if (c.phone && t.includes(c.phone.slice(-4))) score += 50;
    if (c.industry && t.includes(c.industry)) score += 30;
    if (score > bestScore) { bestScore = score; bestMatch = c; }
  }
  // 1b. 模糊匹配（纠正错别字）
  if (!bestMatch || bestScore < 50) {
    const segments = t.split(/[，。！？,\.\s;；]/).filter(s => s.trim().length >= 2);
    for (const seg of segments) {
      const segTrim = seg.trim();
      for (const c of customers) {
        const name = c.name;
        const len = name.length;
        if (len < 2) continue;
        // 滑动窗口，大小范围 [len-2, len+2]
        const minW = Math.max(2, len - 2);
        const maxW = Math.min(segTrim.length, len + 2);
        for (let w = minW; w <= maxW; w++) {
          for (let i = 0; i <= segTrim.length - w; i++) {
            const candidate = segTrim.substring(i, i + w);
            if (candidate === name) continue; // 精确匹配已处理
            const dist = levenshtein(candidate, name);
            const maxLen = Math.max(candidate.length, name.length);
            const sim = 1 - dist / maxLen;
            // 阈值：短名字允许1个误差，长名字允许2个
            const threshold = len <= 3 ? 1 : 2;
            if (dist <= threshold && sim >= 0.6) {
              const score = Math.round(sim * 80);
              if (score > bestScore) { bestScore = score; bestMatch = c; }
            }
          }
        }
      }
    }
  }
  if (bestMatch && bestScore >= 30) result.customerId = bestMatch.id;

  // === 2. 负责人识别（支持"麻烦某某看一下"、"让某某处理"等模式）===
  let engMatch = null;
  let engScore = 0;
  // 先尝试匹配"麻烦/让/找/指派 + 姓名 + 看一下/处理/跟进"
  const engPatterns = [
    /(?:麻烦|让|找|指派|交给|给|请|让)\s*([\u4e00-\u9fa5]{2,4})\s*(?:看一下?|处理|跟进|看看|搞一下?|帮忙|解决|排查)/,
    /(?:负责人|指派|工程师)\s*[：:]\s*([\u4e00-\u9fa5]{2,4})/,
  ];
  for (const re of engPatterns) {
    const m = t.match(re);
    if (m) {
      const name = m[1];
      const u = engineers.find(e => e.name === name || e.name.includes(name));
      if (u) { engMatch = u; engScore = 100; break; }
    }
  }
  // 如果没有模式匹配，直接遍历工程师列表做全名/简称匹配
  if (!engMatch) {
    for (const u of engineers) {
      let score = 0;
      if (t.includes(u.name)) score += 100;
      // 匹配姓（如"张"匹配"张三"）
      if (u.name.length >= 2 && t.includes(u.name.charAt(0))) score += 20;
      if (score > engScore) { engScore = score; engMatch = u; }
    }
  }
  // 排除误匹配：如果匹配到的名字同时出现在客户联系人里，降低置信度
  if (engMatch && bestMatch && bestMatch.contact && bestMatch.contact.includes(engMatch.name)) {
    engScore -= 50;
  }
  if (engMatch && engScore >= 40) result.engineerId = engMatch.id;

  // === 3. 优先级识别（更多关键词 + 组合判断）===
  const urgentWords = /紧急|立刻|马上|高优|严重|崩溃|宕机|死机|无法启动|断网|全部|都|报警|告警|火灾|漏水|停电|核心|生产|瘫痪/;
  const highWords = /着急|尽快|重要|关键|影响|故障|报错|异常|连不上|连不了|连不到|访问不了|打不开|连不了|连不上/;
  const lowWords = /低优|不急|稍后|低优先级|看看|咨询|了解一下|请教|建议|优化|升级|未来|计划/;
  
  if (urgentWords.test(t)) result.priority = 'high';
  else if (lowWords.test(t)) result.priority = 'low';
  else if (highWords.test(t)) result.priority = 'high';
  // 增强判断：同时出现多个高优先级词
  const urgentCount = (t.match(/紧急|立刻|马上|严重|崩溃|宕机|死机|无法|断网|瘫痪/g) || []).length;
  if (urgentCount >= 2) result.priority = 'high';

  // === 3. 类别识别（更丰富的关键词映射）===
  const catPatterns = [
    { keys: ['点云','点云质量','点云调试','深度图','深度数据','3D数据','点云生成','点云拼接','点云融合','噪声','空洞','飞点','精度','分辨率','视差','双目','结构光','ToF'], cat: '点云调试' },
    { keys: ['硬件','设备','相机','镜头','电源','主板','内存','硬盘','CPU','风扇','过热','黑屏','花屏','显示器','连接线','接口','USB','网线','线缆','损坏','故障','无法开机','重启'], cat: '硬件故障' },
    { keys: ['软件','程序','应用','客户端','安装','卸载','闪退','报错','异常','Bug','崩溃','卡死','界面','UI','显示','版本','兼容','更新','升级'], cat: '软件问题' },
    { keys: ['SDK','API','接口','开发包','编程','代码','脚本','C++','Python','调用','集成','编译','链接','示例','Demo','文档','开发指南'], cat: 'SDK开发' },
    { keys: ['标定','手眼标定','眼在手上','眼在手外','相机标定','内参','外参','畸变','棋盘格','标定板','圆点标定','坐标系','位姿','矩阵','RPY','旋转','平移','变换'], cat: '手眼标定' },
    { keys: ['需求','沟通','咨询','报价','方案','技术方案','定制','开发','合作','项目','验收','交付','培训','演示','介绍','了解','需求确认'], cat: '需求沟通' },
    { keys: ['样品','测试','检测','测量','验证','精度测试','重复性','对比','评估','试用','样机','现场','实验','验收','报告','数据分析'], cat: '样品测试' },
    { keys: ['选型','相机选型','型号','参数','规格','对比','推荐','适用','场景','应用','分辨率','帧率','视场','FOV','基线','工作距离','环境光','IP防护','接口类型'], cat: '相机选型' },
  ];
  
  let bestCat = null;
  let bestCatScore = 0;
  for (const p of catPatterns) {
    let score = 0;
    for (const k of p.keys) {
      if (t.includes(k)) score += 10;
    }
    if (score > bestCatScore) { bestCatScore = score; bestCat = p.cat; }
  }
  if (bestCat && bestCatScore >= 10) result.category = bestCat;
  // 默认兜底
  if (!result.category) result.category = '其他';

  // === 4. 标题提取（智能清理）===
  // 先移除已识别的客户名和工程师名，避免标题冗长
  let cleanText = t;
  if (bestMatch) {
    cleanText = cleanText.replace(bestMatch.name, '').replace(bestMatch.contact || '', '');
  }
  if (engMatch) {
    cleanText = cleanText.replace(engMatch.name, '');
  }
  // 清理残留的孤立词和噪音
  cleanText = cleanText.replace(/^[\s的，那边我司]+/, '').replace(/^[\s那边我司]+/, '');
  const sentences = cleanText.split(/[，。！？\n;；]/).filter(s => s.trim());
  let title = sentences[0] || cleanText;
  // 循环移除常见前缀噪音词，直到没有匹配
  const noisePattern = /^(麻烦|请|帮忙|你好|您好|请问|我们|公司|这边|今天|现在|刚才|刚刚|发现|出现|有个|有个问题|有个故障|有个报错|报错|故障|问题|一下|帮忙|一下|需要|想|要|希望)\s*/i;
  for (let i = 0; i < 5; i++) {
    const newTitle = title.replace(noisePattern, '');
    if (newTitle === title) break;
    title = newTitle;
  }
  // 再次清理残留
  title = title.replace(/^[\s的，那边]+/, '');
  // 截取前30字，优先在完整词处截断
  if (title.length > 30) {
    const cut = title.substring(0, 30);
    const lastPunc = Math.max(cut.lastIndexOf(' '), cut.lastIndexOf('，'));
    title = lastPunc > 15 ? cut.substring(0, lastPunc) + '...' : cut + '...';
  }
  result.title = title.trim() || '新工单';
  
  return result;
}

// ===================== 通知系统 =====================
function notify(title, message, type = 'info', duration = 3000) {
  const container = document.getElementById('notify-container') || (() => {
    const el = document.createElement('div'); el.id = 'notify-container'; el.className = 'notify-container'; document.body.appendChild(el); return el;
  })();
  const icons = { info: 'ℹ️', success: '✅', warning: '⚠️', error: '❌' };
  const item = document.createElement('div');
  item.className = `notify-item ${type}`;
  item.innerHTML = `<span class="icon">${icons[type]}</span><div class="content"><div class="title">${escapeHtml(title)}</div><div class="message">${escapeHtml(message)}</div></div><span class="notify-close">&times;</span>`;
  item.querySelector('.notify-close').onclick = () => { item.style.animation = 'notifyOut .3s ease forwards'; setTimeout(() => item.remove(), 300); };
  container.appendChild(item);
  if (duration) setTimeout(() => { if (item.parentNode) { item.style.animation = 'notifyOut .3s ease forwards'; setTimeout(() => item.remove(), 300); } }, duration);
}

const routes = {};
let currentRoute = '';
function route(path, handler) { routes[path] = handler; }
function navigate(path) { window.location.hash = '#' + path; }
function matchRoute(hash) {
  const path = hash.replace(/^#/, '') || 'login';
  for (const [pattern, handler] of Object.entries(routes)) {
    const regex = new RegExp('^' + pattern.replace(/:\w+/g, '([^/]+)') + '$');
    const m = path.match(regex);
    if (m) { currentRoute = path; return () => handler(...m.slice(1)); }
  }
  return null;
}
function renderRoute() {
  const app = document.getElementById('app');
  const user = getCurrentUser();
  const hash = window.location.hash;
  // 未登录只能访问login
  if (!user && hash !== '#login') { window.location.hash = '#login'; return; }
  const handler = matchRoute(hash);
  if (handler) { app.innerHTML = ''; handler(); }
  else { app.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><div class="title">页面未找到</div></div>'; }
}
window.addEventListener('hashchange', renderRoute);

let __remindersCache = [];
async function loadReminders() {
  try { __remindersCache = await apiFetch('/reminders'); } catch(e) { console.warn('[Reminders] 加载失败:', e); }
}
function getReminders() { return __remindersCache; }
function saveReminders(v) { __remindersCache = v; }
async function addReminder(ticketId, toUserId, message) {
  const r = { id: generateId(), ticketId, toUserId, message, fromUserId: getCurrentUser().userId, fromName: getCurrentUser().name, createdAt: new Date().toISOString(), read: false };
  try { await apiFetch('/reminders', { method: 'POST', body: JSON.stringify(r) }); __remindersCache.push(r); } catch(e) { console.warn('[Reminders] 添加失败:', e); }
}
async function readReminderAsync(id) {
  try { await apiFetch(`/reminders/${id}/read`, { method: 'PUT' }); } catch(e) {}
  const r = __remindersCache.find(x => x.id === id);
  if (r) r.read = true;
}
async function clearAllRemindersAsync() {
  const uid = (getCurrentUser() || {}).userId;
  try { await apiFetch('/reminders/clear', { method: 'POST' }); } catch(e) {}
  __remindersCache = __remindersCache.map(r => r.toUserId === uid ? {...r, read: true} : r);
}
function getUnreadCount() {
  const uid = (getCurrentUser() || {}).userId;
  return getReminders().filter(r => r.toUserId === uid && !r.read).length;
}
function updateNotifyMenu() {
  const menu = document.getElementById('notify-menu');
  if (!menu) return;
  const uid = (getCurrentUser() || {}).userId;
  const list = getReminders().filter(r => r.toUserId === uid).sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt)).slice(0,20);
  if (!list.length) { menu.innerHTML = '<div class="dropdown-item text-muted">暂无提醒</div>'; return; }
  menu.innerHTML = list.map(r => `<div class="dropdown-item" style="${r.read?'':'background:#e6f7ff;'};cursor:pointer;" onclick="readReminder('${r.id}')">
    <div><div class="font-sm font-bold">${escapeHtml(r.fromName)} 的提醒</div><div class="font-sm">${escapeHtml(r.message)}</div><div class="font-sm text-muted">${formatDate(r.createdAt)}</div></div>
  </div>`).join('') + '<div class="dropdown-item text-center text-primary" onclick="clearAllReminders()">全部已读</div>';
}
async function readReminder(id) {
  await readReminderAsync(id);
  updateNotifyMenu();
  const r = getReminders().find(x => x.id === id);
  if (r && r.ticketId) navigate('ticket/' + r.ticketId);
}
async function clearAllReminders() {
  await clearAllRemindersAsync();
  updateNotifyMenu();
}

window.bindCustomerSearch = () => {
  const searchInput = document.getElementById('new-customer-search');
  const idInput = document.getElementById('new-customer-id');
  const suggestions = document.getElementById('customer-suggestions');
  if (!searchInput || !suggestions) return;

  const showSuggestions = (list) => {
    if (!list.length) { suggestions.style.display = 'none'; return; }
    suggestions.innerHTML = list.map(c => `<div class="suggestion-item" data-id="${c.id}" style="padding:8px 12px;cursor:pointer;transition:background .15s;" onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background=''">${escapeHtml(c.name)} <span class="text-muted" style="font-size:.8rem">${escapeHtml(c.contact||'')}</span></div>`).join('');
    suggestions.style.display = 'block';
    suggestions.querySelectorAll('.suggestion-item').forEach(el => {
      el.addEventListener('click', () => {
        searchInput.value = el.textContent.replace(/\s+/g, ' ').trim();
        idInput.value = el.dataset.id;
        suggestions.style.display = 'none';
      });
    });
  };

  searchInput.addEventListener('input', debounce(() => {
    const val = searchInput.value.trim().toLowerCase();
    idInput.value = ''; // 清空已选ID，重新搜索
    if (!val) { suggestions.style.display = 'none'; return; }
    const matches = getCustomers().filter(c =>
      c.name.toLowerCase().includes(val) ||
      (c.contact && c.contact.toLowerCase().includes(val)) ||
      (c.phone && c.phone.includes(val))
    ).slice(0, 8);
    showSuggestions(matches);
  }, 200));

  searchInput.addEventListener('focus', () => {
    const val = searchInput.value.trim().toLowerCase();
    if (!val) {
      // 空值时显示最近客户
      showSuggestions(getCustomers().slice(0, 6));
      return;
    }
    const matches = getCustomers().filter(c =>
      c.name.toLowerCase().includes(val) ||
      (c.contact && c.contact.toLowerCase().includes(val)) ||
      (c.phone && c.phone.includes(val))
    ).slice(0, 8);
    showSuggestions(matches);
  });

  // 点击外部关闭建议
  document.addEventListener('click', (e) => {
    if (!searchInput.contains(e.target) && !suggestions.contains(e.target)) {
      suggestions.style.display = 'none';
    }
  });

  // 键盘导航
  searchInput.addEventListener('keydown', (e) => {
    const items = suggestions.querySelectorAll('.suggestion-item');
    const active = suggestions.querySelector('.suggestion-item.active');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (!active) { items[0] && items[0].classList.add('active'); items[0] && (items[0].style.background = 'var(--primary-light)'); }
      else {
        const next = active.nextElementSibling;
        if (next) { active.classList.remove('active'); active.style.background = ''; next.classList.add('active'); next.style.background = 'var(--primary-light)'; }
      }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (active) {
        const prev = active.previousElementSibling;
        if (prev) { active.classList.remove('active'); active.style.background = ''; prev.classList.add('active'); prev.style.background = 'var(--primary-light)'; }
      }
    } else if (e.key === 'Enter') {
      if (active) { active.click(); e.preventDefault(); }
    } else if (e.key === 'Escape') {
      suggestions.style.display = 'none';
    }
  });
};

window.exportTickets = async () => {
  try {
    const resp = await fetch(`${API_BASE}/export/tickets`, { headers: { Authorization: `Bearer ${__token}` } });
    if (!resp.ok) throw new Error('导出失败');
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `tickets_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    notify('导出成功', '工单 CSV 已下载', 'success');
  } catch (e) {
    notify('导出失败', e.message, 'error');
  }
};

window.importData = async () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!confirm('导入将覆盖现有数据，建议先导出备份。确定继续？')) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      await apiFetch('/import', { method: 'POST', body: JSON.stringify(data) });
      await loadAllData();
      window.dispatchEvent(new HashChangeEvent('hashchange'));
      notify('导入成功', '数据已恢复', 'success');
    } catch (err) {
      notify('导入失败', err.message, 'error');
    }
  };
  input.click();
};

window.doTransfer = async (id) => {
  const newEng = document.getElementById('transfer-engineer').value;
  const note = document.getElementById('transfer-note').value.trim();
  try {
    await saveTicketUpdate(id, { engineerId: newEng, updatedAt: new Date().toISOString() });
    const t = getTickets().find(x => x.id === id);
    if (t) {
      const oldEng = t.engineerId;
      await addTicketComment(id, { content: `工单转交给 ${(getUsers().find(u=>u.id===newEng) || {}).name || ''}${note ? '，备注：'+note : ''}` });
      addReminder(id, newEng, `工单 ${id} 已转交给您：${t.title}`);
      if (oldEng !== newEng) addReminder(id, oldEng, `工单 ${id} 已转交他人：${t.title}`);
    }
    notify('转交成功', '', 'success');
    document.querySelector('.modal-overlay').remove();
    await loadAllData();
    window.dispatchEvent(new HashChangeEvent('hashchange'));
  } catch (e) {
    notify('转交失败', e.message, 'error');
  }
};

window.submitDevice = async (cid) => {
  const name = document.getElementById('dev-name').value.trim();
  if (!name) { notify('请填写设备名称', '', 'warning'); return; }
  try {
    const c = getCustomers().find(x => x.id === cid);
    if (c) {
      c.devices = c.devices || [];
      c.devices.push({ name, model: document.getElementById('dev-model').value, sn: document.getElementById('dev-sn').value });
      await updateCustomerAsync(cid, { devices: c.devices });
      notify('添加成功', '', 'success');
      document.querySelector('.modal-overlay').remove();
      navigate('customer/' + cid);
    }
  } catch (e) {
    notify('添加失败', e.message, 'error');
  }
};
window.removeDevice = async (cid, idx) => {
  if (!confirm('确定删除此设备？')) return;
  try {
    const c = getCustomers().find(x => x.id === cid);
    if (c && c.devices) { c.devices.splice(idx, 1); await updateCustomerAsync(cid, { devices: c.devices }); notify('已删除', '', 'success'); navigate('customer/' + cid); }
  } catch (e) {
    notify('删除失败', e.message, 'error');
  }
};

window.openQuickCreateTicket = () => {
  const text = document.getElementById('quick-ticket-input').value.trim();
  openCreateTicketModal();
  if (!text) return;
  // 等待弹窗渲染后填充智能解析结果
  setTimeout(() => {
    const parsed = parseTicketInput(text);
    const titleEl = document.getElementById('new-title');
    const priorityEl = document.getElementById('new-priority');
    const categoryEl = document.getElementById('new-category');
    const descEl = document.getElementById('new-desc');
    const smartInput = document.getElementById('smart-input');
    if (titleEl) titleEl.value = parsed.title || '';
    if (parsed.customerId) {
      const c = getCustomers().find(x => x.id === parsed.customerId);
      if (c) {
        const searchEl = document.getElementById('new-customer-search');
        const idEl = document.getElementById('new-customer-id');
        if (searchEl) searchEl.value = c.name;
        if (idEl) idEl.value = c.id;
      }
    }
    if (priorityEl && parsed.priority) priorityEl.value = parsed.priority;
    if (categoryEl && parsed.category) categoryEl.value = parsed.category;
    if (descEl) descEl.value = parsed.description || text;
    if (parsed.engineerId && document.getElementById('new-engineer')) {
      document.getElementById('new-engineer').value = parsed.engineerId;
    }
    if (smartInput) smartInput.value = text;
    smartInput && smartInput.dispatchEvent(new Event('input'));
  }, 50);
};
window.deleteCustomer = async (id) => {
  if (!confirm(`确定删除此客户？关联工单不会被删除，请谨慎操作。`)) return;
  try {

    window.dispatchEvent(new HashChangeEvent('hashchange'));

    notify('删除失败', e.message, 'error');
  }
};

// ===================== 统计报表 (Admin) =====================
route('admin/stats', () => {
  if (!isAdmin()) { notify('无权访问', '', 'error'); navigate('dashboard'); return; }
  renderLayout(container => {
    const tickets = getTickets();
    const users = getUsers();
    const customers = getCustomers();
    const statusCounts = { pending: 0, processing: 0, resolved: 0 };
    tickets.forEach(t => { if (statusCounts[t.status] !== undefined) statusCounts[t.status]++; });
    const priorityCounts = { high: tickets.filter(t=>t.priority==='high').length, medium: tickets.filter(t=>t.priority==='medium').length, low: tickets.filter(t=>t.priority==='low').length };
    const categoryCounts = {};
    tickets.forEach(t => { categoryCounts[t.category] = (categoryCounts[t.category] || 0) + 1; });
    const engineerStats = users.filter(u=>u.role==='engineer').map(u => {
      const ts = tickets.filter(t => t.engineerId === u.id);
      return { name: u.name, total: ts.length, resolved: ts.filter(t=>t.status==='resolved').length, processing: ts.filter(t=>t.status==='processing').length, pending: ts.filter(t=>t.status==='pending').length };
    });
    // 最近7天工单趋势
    const dailyCounts = {};
    for (let i=6; i>=0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const key = `${d.getMonth()+1}/${d.getDate()}`;
      dailyCounts[key] = tickets.filter(t => { const cd = new Date(t.createdAt); return cd.getDate()===d.getDate() && cd.getMonth()===d.getMonth(); }).length;
    }
    const maxDaily = Math.max(...Object.values(dailyCounts), 1);
    container.innerHTML = `
      <h1 class="page-title">📈 统计报表</h1>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-icon blue">🎫</div><div><div class="stat-value">${tickets.length}</div><div class="stat-label">总工单</div></div></div>
        <div class="stat-card"><div class="stat-icon green">✅</div><div><div class="stat-value">${Math.round((statusCounts.resolved/tickets.length)*100)||0}%</div><div class="stat-label">解决率</div></div></div>
        <div class="stat-card"><div class="stat-icon orange">⏱️</div><div><div class="stat-value">${tickets.filter(t=>t.status!=='resolved').length}</div><div class="stat-label">未完成</div></div></div>
        <div class="stat-card"><div class="stat-icon cyan">👥</div><div><div class="stat-value">${customers.length}</div><div class="stat-label">客户数</div></div></div>
      </div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="card">
          <div class="card-header"><span class="card-title">工单状态分布</span></div>
          <div class="card-body">
            <div style="display:flex; gap: 8px; margin-bottom: 12px;">
              <div style="flex:${statusCounts.pending}; background:var(--warning); height:24px; border-radius:4px 0 0 4px;" title="待处理"></div>
              <div style="flex:${statusCounts.processing}; background:var(--primary); height:24px;" title="处理中"></div>
              <div style="flex:${statusCounts.waiting || 0}; background:#7c3aed; height:24px;" title="等待客户回复"></div>
              <div style="flex:${statusCounts.resolved}; background:var(--success); height:24px; border-radius:0 4px 4px 0;" title="已解决"></div>
            </div>
            <div class="flex flex-center gap-2">
              <span class="tag tag-orange">待处理 ${statusCounts.pending}</span>
              <span class="tag tag-blue">处理中 ${statusCounts.processing}</span>
              <span class="tag tag-purple">等待回复 ${statusCounts.waiting || 0}</span>
              <span class="tag tag-green">已解决 ${statusCounts.resolved}</span>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">优先级分布</span></div>
          <div class="card-body">
            <div style="display:flex; gap: 8px; margin-bottom: 12px;">
              <div style="flex:${priorityCounts.high}; background:var(--danger); height:24px; border-radius:4px 0 0 4px;" title="高"></div>
              <div style="flex:${priorityCounts.medium}; background:var(--warning); height:24px;" title="中"></div>
              <div style="flex:${priorityCounts.low}; background:var(--success); height:24px; border-radius:0 4px 4px 0;" title="低"></div>
            </div>
            <div class="flex flex-center gap-2">
              <span class="tag tag-red">高 ${priorityCounts.high}</span>
              <span class="tag tag-orange">中 ${priorityCounts.medium}</span>
              <span class="tag tag-green">低 ${priorityCounts.low}</span>
            </div>
          </div>
        </div>
      </div>
      <div class="card mt-4">
        <div class="card-header"><span class="card-title">📅 近7天工单趋势</span></div>
        <div class="card-body">
          <div style="display:flex; align-items:flex-end; gap: 12px; height:120px; padding: 10px 0;">
            ${Object.entries(dailyCounts).map(([k,v]) => `<div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:100%; background:var(--primary); border-radius:4px 4px 0 0; height:${(v/maxDaily*100)||4}px; min-height:4px; transition:height .3s;"></div><div class="font-sm text-muted">${k}</div><div class="font-sm font-bold">${v}</div></div>`).join('')}
          </div>
        </div>
      </div>
      <div class="card mt-4">
        <div class="card-header"><span class="card-title">👨‍💻 工程师工作统计</span></div>
        <div class="card-body" style="padding:0;"><div class="table-wrap">
          <table class="data-table"><thead><tr><th>工程师</th><th>总工单</th><th>已解决</th><th>处理中</th><th>待处理</th><th>解决率</th></tr></thead>
          <tbody>${engineerStats.map(s => `<tr><td>${escapeHtml(s.name)}</td><td>${s.total}</td><td>${s.resolved}</td><td>${s.processing}</td><td>${s.pending}</td><td>${s.total?Math.round(s.resolved/s.total*100):0}%</td></tr>`).join('')}</tbody>
          </table>
        </div></div>
      </div>
      <div class="card mt-4">
        <div class="card-header"><span class="card-title">📂 分类统计</span></div>
        <div class="card-body">
          <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px;">
            ${Object.entries(categoryCounts).map(([k,v]) => `<div style="background:#f5f5f5; padding:12px 16px; border-radius:var(--radius); display:flex; justify-content:space-between; align-items:center;"><span>${escapeHtml(k)}</span><span class="font-bold text-primary">${v}</span></div>`).join('')}
          </div>
        </div>
      </div>`;
  });
});
